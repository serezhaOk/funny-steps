<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>FUNNY STEPS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◼</text></svg>" />
  </head>
  <body>
    <div id="boot">
      <div class="boot-grid" aria-hidden="true"></div>
      <button id="boot-btn">TAP TO START</button>
      <pre id="boot-err" hidden></pre>
    </div>

    <div id="app" hidden>
      <header>
        <button id="bpm" class="lbl">120 BPM</button>
        <div class="key">
          <button id="root" class="lbl">A</button>
          <button id="scale" class="lbl">MINOR</button>
        </div>
      </header>
      <canvas id="grid"></canvas>
      <footer>
        <button id="erase" class="lbl">ERASE</button>
        <button id="sample" class="lbl">KALIMBOX</button>
        <button id="rndm" class="lbl">RNDM</button>
      </footer>
      <div class="home" aria-hidden="true"></div>
    </div>

    <script>
      // Surface any startup error on screen (mobile has no console).
      window.__bootErr = function (m) {
        var e = document.getElementById('boot-err');
        if (e) { e.textContent = String(m); e.hidden = false; }
      };
      window.addEventListener('error', function (ev) {
        window.__bootErr((ev.error && ev.error.stack) || ev.message);
      });
      window.addEventListener('unhandledrejection', function (ev) {
        var r = ev.reason;
        window.__bootErr('promise: ' + ((r && (r.stack || r.message)) || r));
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
